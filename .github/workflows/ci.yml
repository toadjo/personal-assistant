name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Verify preload IPC codegen
        run: npm run check:preload-ipc

      - name: Unit tests with coverage
        run: npm run test -- --coverage

      - name: Build (renderer + main)
        run: npm run build

      - name: Electron preload smoke (real preload in BrowserWindow)
        run: npm run test:preload-electron

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
