name: Release package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to package (e.g. 1.2.3), must match package.json unless you change it first"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version (tag builds only)
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $pkg = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $expected = "v$pkg"
          if ($tag -ne $expected) {
            Write-Error "Git tag '$tag' must equal package.json version as 'v$pkg' (expected '$expected')."
            exit 1
          }
          Write-Host "OK: tag $tag matches package.json version $pkg"

      - name: Validate workflow_dispatch version
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $want = "${{ github.event.inputs.version }}".Trim()
          if ($want -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Version must be semver x.y.z"
            exit 1
          }
          $pkg = (Get-Content -Raw package.json | ConvertFrom-Json).version
          if ($want -ne $pkg) {
            Write-Error "package.json version is $pkg but workflow requested $want. Bump package.json first or pass matching version."
            exit 1
          }
          Write-Host "OK: dispatch version matches package.json ($pkg)"

      - name: Package installer (no git bump in CI)
        run: npm run release:build -- -SkipVersionBump -AllowDirtyGit -ReplaceExisting

      - name: Resolve versioned artifact paths
        id: artifacts
        shell: pwsh
        run: |
          $v = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $tag = "v$v"
          $releaseDir = Join-Path "release" $tag
          $historyDir = Join-Path "installer-history" $tag
          if (-not (Test-Path -LiteralPath $releaseDir)) { throw "Missing $releaseDir — packaging may have failed." }
          if (-not (Test-Path -LiteralPath $historyDir)) { throw "Missing $historyDir — packaging may have failed." }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "release_tag=$tag"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nsis-${{ github.run_id }}
          path: installer-history/${{ steps.artifacts.outputs.release_tag }}/
